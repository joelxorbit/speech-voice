<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCare Patient Portal - Welcome</title>
    <meta name="description" content="VoiceCare Patient Portal entrance with automatic voice assistant navigation.">
    <meta http-equiv="refresh" content="2;url=login.html">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .splash-card {
            text-align: center;
            max-width: 480px;
            padding: 3rem 2.5rem;
            margin: auto;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(6, 182, 212, 0.2);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="login.html" class="logo">
            <div class="logo-icon">🎤</div>
            <span>VoiceCare</span>
            <span class="portal-tag">Patient Portal</span>
        </a>
        <ul class="nav-links">
            <li><a href="login.html">Patient Login</a></li>
            <li><a href="signup.html">New Patient Signup</a></li>
        </ul>
    </nav>

    <main>
        <div class="glass-panel splash-card">
            <h1 style="font-size: 2.2rem; margin-bottom: 0.75rem;">Welcome to VoiceCare</h1>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
                Redirecting to Patient Portal Login...
            </p>
            
            <div class="spinner"></div>

            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                <a href="login.html" class="btn-primary" style="text-decoration: none; max-width: 180px;">Login</a>
                <a href="signup.html" class="btn-primary" style="text-decoration: none; max-width: 180px; background: rgba(6, 182, 212, 0.15); border: 1px solid var(--accent-cyan);">Signup</a>
            </div>
        </div>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/speech.js"></script>
</body>
</html>
