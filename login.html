<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Speech Navigation</title>
    <meta name="description" content="Login to your account.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🎤 <span>Voice</span>Nav</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Signup</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <div class="glass-panel page-content" style="max-width: 450px; width: 100%;">
            <h2 style="text-align: center;">Welcome Back</h2>
            <p style="text-align: center; margin-bottom: 2rem;">Sign in to continue</p>
            
            <form onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" style="color: var(--accent-hover); text-decoration: none;">Sign Up</a>
            </p>
        </div>

        <!-- Floating Mic Button & Status Box (Required on every page for voice nav) -->
        <div class="mic-container" style="position: fixed; bottom: 20px; right: 20px; width: 80px; height: 80px; margin: 0;">
            <div class="wave"></div>
            <div class="wave"></div>
            <button class="mic-btn" id="micBtn" style="width: 60px; height: 60px; font-size: 1.5rem;">🎤</button>
        </div>
        <div class="glass-panel status-box" id="statusBox" style="position: fixed; bottom: 120px; right: 20px; z-index: 1000; min-width: 250px;">
            <div class="status-text" id="statusText">Status</div>
            <div class="recognized-text" id="recognizedText" style="font-size: 1.1rem;">Waiting...</div>
        </div>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/speech.js"></script>
</body>
</html>
