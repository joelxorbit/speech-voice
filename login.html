<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCare Patient Portal - Secure Login</title>
    <meta name="description" content="Log in to your VoiceCare Patient Portal.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="login.html" class="logo">
            <div class="logo-icon">🎤</div>
            <span>VoiceCare</span>
            <span class="portal-tag">Patient Portal</span>
        </a>
        <div id="voiceStatusPill" class="voice-status-pill">
            <div class="live-dot"></div>
            <span id="voiceStatusText">Listening</span>
        </div>
        <ul class="nav-links">
            <li><a href="login.html" class="active">Patient Login</a></li>
            <li><a href="signup.html">New Patient Signup</a></li>
        </ul>
    </nav>

    <main>
        <div class="glass-panel portal-card">
            <div class="portal-header">
                <h1>Patient Portal Login</h1>
                <p>Sign in to access your medical records and appointments.</p>
            </div>
            
            <form id="loginForm" class="portal-form">
                <div class="form-group">
                    <label for="email">Patient Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="patient@example.com" required autocomplete="email">
                        <span class="input-icon">👤</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" checked>
                        <span>Remember this device</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary">
                    <span>Sign In</span>
                    <span>→</span>
                </button>
            </form>

            <div class="portal-footer">
                Don't have a Patient Portal account? <a href="signup.html">Create Patient Profile</a>
            </div>
        </div>

        <!-- Voice Assistant Dock (Fixed Bottom) -->
        <div class="voice-dock">
            <div class="dock-left">
                <div class="mic-button-wrapper">
                    <button id="micBtn" class="mic-btn listening" title="Click to mute/unmute voice recognition">🎤</button>
                </div>
                <div class="mic-status-info">
                    <span class="mic-status-title">Voice Control Active</span>
                    <span id="micTranscript" class="mic-transcript">Listening for voice commands...</span>
                </div>
            </div>

            <div id="visualizer" class="visualizer listening">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
            </div>
        </div>
    </main>
    
    <script src="js/navigation.js"></script>
    <script src="js/speech.js"></script>
</body>
</html>
